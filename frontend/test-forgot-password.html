<!DOCTYPE html>
<html>

<head>
    <title>Test Forgot Password</title>
</head>

<body>
    <h1>Test Forgot Password</h1>

    <div id="step1">
        <input type="email" id="email" placeholder="Enter email">
        <button onclick="sendOTP()">Send OTP</button>
    </div>

    <div id="step2" style="display:none;">
        <h2>Step 2 - Enter OTP</h2>
        <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6">
        <button onclick="verifyOTP()">Verify OTP</button>
    </div>

    <div id="message" style="color: red; margin: 10px 0;"></div>

    <script>
        let userEmail = '';

        async function sendOTP() {
            const email = document.getElementById('email').value;
            const msgDiv = document.getElementById('message');

            if (!email) {
                msgDiv.textContent = 'Please enter email';
                return;
            }

            console.log('Sending OTP to:', email);
            userEmail = email;

            try {
                const response = await fetch('http://localhost:5000/api/forgot-password/send-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);

                if (data.success) {
                    msgDiv.style.color = 'green';
                    msgDiv.textContent = 'OTP sent! Check your email and console';
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                } else {
                    msgDiv.style.color = 'red';
                    msgDiv.textContent = 'Error: ' + data.message;
                }
            } catch (error) {
                console.error('Error:', error);
                msgDiv.style.color = 'red';
                msgDiv.textContent = 'Network error: ' + error.message;
            }
        }

        async function verifyOTP() {
            const otp = document.getElementById('otp').value;
            const msgDiv = document.getElementById('message');

            if (otp.length !== 6) {
                msgDiv.textContent = 'Please enter 6-digit OTP';
                return;
            }

            console.log('Verifying OTP:', otp);

            try {
                const response = await fetch('http://localhost:5000/api/forgot-password/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, code: otp })
                });

                const data = await response.json();
                console.log('Verify response:', data);

                if (data.success) {
                    msgDiv.style.color = 'green';
                    msgDiv.textContent = 'OTP verified successfully!';
                } else {
                    msgDiv.style.color = 'red';
                    msgDiv.textContent = 'Invalid OTP: ' + data.message;
                }
            } catch (error) {
                console.error('Error:', error);
                msgDiv.style.color = 'red';
                msgDiv.textContent = 'Network error: ' + error.message;
            }
        }
    </script>
</body>

</html>
