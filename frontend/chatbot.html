<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AR PG AI Assistant - Get instant answers about accommodation, rooms, facilities, and booking">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Security -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <title>AR PG - AI Assistant | Ask Me Anything</title>
    
    <link rel="icon" type="image/png" href="image.png">
    
    <style>
        /* ========== CSS RESET & VARIABLES ========== */
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #a29bfe;
            --neon-cyan: #0ff;
            --neon-green: #0f0;
            --dark-bg: #0a0a0f;
            --card-bg: rgba(15, 15, 25, 0.95);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            --success: #27ae60;
            --error: #e74c3c;
            --warning: #f39c12;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* ========== ANIMATED BACKGROUND ========== */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        /* Grid Pattern */
        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(90deg, rgba(102, 126, 234, 0.08) 1px, transparent 1px),
                linear-gradient(rgba(102, 126, 234, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Gradient Orbs */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: orbFloat 15s ease-in-out infinite;
        }

        .bg-orb:nth-child(1) {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .bg-orb:nth-child(2) {
            width: 300px;
            height: 300px;
            background: var(--secondary);
            bottom: -50px;
            right: -50px;
            animation-delay: 5s;
        }

        .bg-orb:nth-child(3) {
            width: 250px;
            height: 250px;
            background: var(--accent);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 10s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 10px) scale(1.05); }
        }

        /* Scan Line */
        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), transparent);
            animation: scanLine 4s linear infinite;
            opacity: 0.6;
            box-shadow: 0 0 20px var(--primary);
        }

        @keyframes scanLine {
            0% { top: -10px; opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { top: 100%; opacity: 0; }
        }

        /* ========== MAIN CONTAINER ========== */
        .chat-container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            padding: 0;
        }

        /* ========== HEADER ========== */
        .chat-header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(102, 126, 234, 0.3);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.4);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            font-size: 1.2rem;
        }

        .back-btn:hover {
            background: rgba(102, 126, 234, 0.4);
            border-color: var(--primary);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        .bot-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            position: relative;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
        }

        .bot-avatar::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--primary);
            border-right-color: var(--secondary);
            animation: avatarSpin 3s linear infinite;
        }

        @keyframes avatarSpin {
            to { transform: rotate(360deg); }
        }

        .bot-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: var(--neon-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px var(--neon-green);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
        }

        .bot-info h1 {
            font-size: 1.2rem;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .bot-info p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .header-right {
            display: flex;
            gap: 10px;
        }

        .header-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(102, 126, 234, 0.15);
            border: 1px solid rgba(102, 126, 234, 0.3);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1rem;
        }

        .header-btn:hover {
            background: rgba(102, 126, 234, 0.3);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.4);
        }

        /* ========== CHAT MESSAGES AREA ========== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: rgba(102, 126, 234, 0.1);
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            border-radius: 3px;
        }

        /* Message Bubbles */
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.2rem;
        }

        .message.bot .message-avatar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.4);
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #3498db, #2980b9);
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.4);
        }

        .message-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message-bubble {
            padding: 15px 20px;
            border-radius: 20px;
            line-height: 1.6;
            position: relative;
        }

        .message.bot .message-bubble {
            background: rgba(102, 126, 234, 0.15);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-top-left-radius: 5px;
            color: var(--text-primary);
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-top-right-radius: 5px;
            color: white;
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            padding: 0 5px;
        }

        .message.user .message-time {
            text-align: right;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px 20px;
            align-items: center;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        /* ========== QUICK ACTIONS ========== */
        .quick-actions {
            padding: 15px 20px;
            border-top: 1px solid rgba(102, 126, 234, 0.2);
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
        }

        .quick-actions-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .quick-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .quick-btn {
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.3);
            color: var(--accent);
            padding: 10px 18px;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quick-btn:hover {
            background: rgba(102, 126, 234, 0.25);
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }

        .quick-btn:active {
            transform: translateY(0);
        }

        .quick-btn.highlight {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
            border-color: var(--primary);
        }

        /* ========== CATEGORY TABS ========== */
        .category-tabs {
            display: flex;
            gap: 10px;
            padding: 10px 20px;
            overflow-x: auto;
            background: rgba(10, 10, 15, 0.6);
            border-top: 1px solid rgba(102, 126, 234, 0.15);
        }

        .category-tabs::-webkit-scrollbar {
            height: 4px;
        }

        .category-tabs::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 2px;
        }

        .category-tab {
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.2);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .category-tab:hover,
        .category-tab.active {
            background: rgba(102, 126, 234, 0.25);
            border-color: var(--primary);
            color: var(--accent);
        }

        .category-tab.active {
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.4);
        }

        /* ========== INPUT AREA ========== */
        .chat-input-area {
            padding: 15px 20px 20px;
            background: linear-gradient(180deg, rgba(10, 10, 15, 0.8), rgba(15, 15, 25, 0.95));
            border-top: 1px solid rgba(102, 126, 234, 0.2);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-container {
            flex: 1;
            position: relative;
        }

        .chat-input {
            width: 100%;
            background: rgba(102, 126, 234, 0.1);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 25px;
            padding: 15px 50px 15px 20px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            resize: none;
            max-height: 120px;
            transition: all 0.3s;
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.15);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.2);
        }

        .emoji-btn {
            position: absolute;
            right: 15px;
            bottom: 12px;
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.3s;
        }

        .emoji-btn:hover {
            opacity: 1;
            transform: scale(1.2);
        }

        .send-btn {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 25px rgba(102, 126, 234, 0.4);
        }

        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 35px rgba(102, 126, 234, 0.6);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ========== SUGGESTIONS IN MESSAGES ========== */
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .suggestion-btn {
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.4);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .suggestion-btn:hover {
            background: rgba(102, 126, 234, 0.35);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.3);
        }

        /* ========== INFO CARDS IN MESSAGES ========== */
        .info-card {
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-top: 15px;
        }

        .info-card h3 {
            color: var(--accent);
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        .info-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(102, 126, 234, 0.2);
            transition: all 0.3s;
        }

        .info-item:hover {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.1);
        }

        .info-item .icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .info-item .label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .info-item .value {
            font-size: 1rem;
            color: var(--text-primary);
            font-weight: 600;
        }

        /* Room Cards */
        .room-cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }

        .room-card {
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .room-card:hover {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.2);
            transform: translateX(5px);
        }

        .room-card-info h4 {
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .room-card-info p {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .room-card-price {
            text-align: right;
        }

        .room-card-price .price {
            color: var(--accent);
            font-size: 1.2rem;
            font-weight: bold;
        }

        .room-card-price .period {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
        }

        .action-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .action-btn.secondary {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--accent);
        }

        .action-btn.secondary:hover {
            background: rgba(102, 126, 234, 0.15);
        }

        /* ========== WELCOME MESSAGE ========== */
        .welcome-section {
            text-align: center;
            padding: 30px 20px;
        }

        .welcome-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: welcomeBounce 2s ease infinite;
        }

        @keyframes welcomeBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .welcome-section h2 {
            font-size: 1.6rem;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .welcome-section p {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 25px;
        }

        /* ========== FAQ ACCORDION ========== */
        .faq-list {
            margin-top: 15px;
        }

        .faq-item {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 10px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .faq-question {
            padding: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-primary);
            transition: all 0.3s;
        }

        .faq-question:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .faq-question .icon {
            transition: transform 0.3s;
        }

        .faq-item.open .faq-question .icon {
            transform: rotate(180deg);
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            color: var(--text-secondary);
        }

        .faq-item.open .faq-answer {
            max-height: 200px;
        }

        .faq-answer-content {
            padding: 0 15px 15px;
            border-top: 1px solid rgba(102, 126, 234, 0.1);
        }

        /* ========== MOBILE RESPONSIVE ========== */
        @media (max-width: 768px) {
            .chat-header {
                padding: 12px 15px;
            }

            .bot-avatar {
                width: 45px;
                height: 45px;
                font-size: 1.5rem;
            }

            .bot-info h1 {
                font-size: 1rem;
            }

            .header-right {
                gap: 5px;
            }

            .header-btn {
                width: 36px;
                height: 36px;
            }

            .chat-messages {
                padding: 15px;
            }

            .message {
                max-width: 90%;
            }

            .message-avatar {
                width: 32px;
                height: 32px;
                font-size: 1rem;
            }

            .message-bubble {
                padding: 12px 16px;
            }

            .quick-actions {
                padding: 12px 15px;
            }

            .quick-btn {
                padding: 8px 14px;
                font-size: 0.85rem;
            }

            .category-tabs {
                padding: 8px 15px;
            }

            .chat-input-area {
                padding: 12px 15px 15px;
            }

            .chat-input {
                padding: 12px 45px 12px 15px;
            }

            .send-btn {
                width: 50px;
                height: 50px;
            }

            .info-card-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .action-buttons {
                flex-direction: column;
            }
        }

        @media (max-width: 400px) {
            .quick-buttons {
                flex-direction: column;
            }

            .quick-btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* ========== LOADING OVERLAY ========== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;

                for (const pattern of data.patterns) {

            return { key: 'default', ...knowledgeBase.default };

            scrollToBottom();
        }

        function hideTypingIndicator() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        // ========== CATEGORY HANDLING ==========
        function handleCategoryClick(tab) {
            // Update active state
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');

            const category = tab.dataset.category;

            if (category === 'all') {
                updateQuickButtons('all');
                return;
            }

            // Send category question
            const categoryQuestions = {
                rooms: 'What rooms are available?',
                facilities: 'What facilities do you provide?',
                pricing: 'What is the rent and pricing?',
                food: 'Tell me about food and mess',
                location: 'Where is AR PG located?',
                booking: 'How can I book a room?',
                rules: 'What are the rules and timings?'
            };

            if (categoryQuestions[category]) {
                sendQuickMessage(categoryQuestions[category]);
            }
        }

        function updateQuickButtons(category) {
            const container = document.getElementById('quickButtons');
            
            const allButtons = `
                <button class="quick-btn highlight" onclick="sendQuickMessage('What rooms are available?')">🛏️ Available Rooms</button>
                <button class="quick-btn" onclick="sendQuickMessage('What is the rent?')">💰 Rent & Pricing</button>
                <button class="quick-btn" onclick="sendQuickMessage('What facilities do you provide?')">⚡ Facilities</button>
                <button class="quick-btn" onclick="sendQuickMessage('How can I book a room?')">📝 How to Book</button>
                <button class="quick-btn" onclick="sendQuickMessage('Where is AR PG located?')">📍 Location</button>
                <button class="quick-btn" onclick="sendQuickMessage('Tell me about food and mess')">🍽️ Food & Mess</button>
            `;

            container.innerHTML = allButtons;
        }

        // ========== UTILITY FUNCTIONS ==========
        function sanitizeInput(str) {
            if (!str) return '';
            return str
                .replace(/[<>]/g, '')
                .replace(/javascript:/gi, '')
                .replace(/on\w+=/gi, '')
                .trim()
                .substring(0, 500);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getCurrentTime() {
            return new Date().toLocaleTimeString('en-IN', {
                hour: '2-digit',
                minute: '2-digit',
                hour12: true
            });
        }

        function scrollToBottom() {
            const container = document.getElementById('chatMessages');
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 100);
        }

        function playSound(type) {
            if (!soundEnabled) return;
            // Sound can be implemented with Audio API
            // For now, just a visual feedback
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('soundBtn');
            btn.textContent = soundEnabled ? '🔊' : '🔇';
        }

        function clearChat() {
            if (confirm('Clear all messages?')) {
                const container = document.getElementById('chatMessages');
                container.innerHTML = `
                    <div class="welcome-section" id="welcomeSection">
                        <div class="welcome-icon">👋</div>
                        <h2>Welcome to AR PG!</h2>
                        <p>I'm your AI assistant. Ask me anything about rooms, facilities, pricing, or booking!</p>
                    </div>
                `;
                messageHistory = [];
                showWelcomeMessage();
            }
        }

        function addEmoji() {
            const input = document.getElementById('chatInput');
            const emojis = ['😊', '👍', '🏠', '📞', '💰', '❓', '🙏', '👋'];
            const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            input.value += randomEmoji;
            input.focus();
        }

        // ========== ERROR HANDLING ==========
        window.addEventListener('error', (e) => {
            console.error('Error:', e.error);
            return true;
        });

        window.addEventListener('unhandledrejection', (e) => {
            console.error('Promise rejection:', e.reason);
            e.preventDefault();
        });

        console.log('🤖 AR PG Chatbot Initialized!');
    </script>
</body>
</html>
